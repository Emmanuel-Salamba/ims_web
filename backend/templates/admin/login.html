{% extends "admin/login.html" %}
{% load static %}

{% block extrahead %}
<link rel="icon" href="/static/admin/img/ims-icon.png" type="image/png">
<style>
    /* Login page background */
    .login {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
    }
    
    /* Fix login form size */
    .login-box {
        width: 360px !important;
        max-width: 90% !important;
    }
    
    .card {
        border-radius: 10px !important;
        box-shadow: 0 5px 20px rgba(0,0,0,0.1) !important;
    }
    
    .card-body {
        padding: 1.5rem !important;
    }
    
    .btn-primary {
        background-color: #9e8f5e !important;
        border-color: #9e8f5e !important;
        padding: 8px 20px !important;
        font-size: 14px !important;
    }
    
    .btn-primary:hover {
        background-color: #8a7d52 !important;
        border-color: #8a7d52 !important;
    }
    
    .form-control:focus {
        border-color: #9e8f5e !important;
        box-shadow: 0 0 0 0.2rem rgba(158, 143, 94, 0.25) !important;
    }
    
    .login-logo {
        display: none !important;
    }
</style>
{% endblock %}

{% block content %}
<div style="text-align: center; margin-bottom: 25px;">
    <img src="/static/admin/img/ims-logo.png" alt="IMS Malawi Logo" style="max-width: 100px; height: auto; margin-bottom: 10px;">
    <h3 style="margin: 0; color: #2F5D50; font-size: 1.2rem;">IMS Malawi Union</h3>
    
</div>
{{ block.super }}
{% endblock %}
