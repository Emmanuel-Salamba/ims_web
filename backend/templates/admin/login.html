{% extends "admin/login.html" %}
{% load static %}

{% block extrahead %}
<link rel="icon" href="/media/logos/ims-icon.png" type="image/png">
<style>
    /* ============================================
       LOGIN PAGE GRADIENT BACKGROUND
    ============================================ */
    
    /* Target the login page body and container */
    html, body, .login {
        background: linear-gradient(to right, #f4f4f4, #e9ecef) !important;
        min-height: 100vh !important;
        background-attachment: fixed !important;
    }
    
    /* Remove any dark overlays */
    .login::before {
        display: none !important;
    }
    
    /* Fix login form size */
    .login-box {
        width: 360px !important;
        max-width: 90% !important;
    }
    
    .card {
        border-radius: 10px !important;
        box-shadow: 0 5px 20px rgba(0,0,0,0.1) !important;
        background: white !important;
    }
    
    .card-body {
        padding: 1.5rem !important;
    }
    
    /* Login button color */
    .btn-primary {
        background-color: #83A371 !important;
        border-color: #83A371 !important;
        padding: 8px 20px !important;
        font-size: 14px !important;
    }
    
    .btn-primary:hover {
        background-color: #6d8a5e !important;
        border-color: #6d8a5e !important;
    }
    
    .form-control:focus {
        border-color: #83A371 !important;
        box-shadow: 0 0 0 0.2rem rgba(131, 163, 113, 0.25) !important;
    }
    
    /* Hide any default branding on login page */
    .login-logo {
        display: none !important;
    }
</style>
{% endblock %}

{% block content %}
<div style="text-align: center; margin-bottom: 25px;">
    <img src="/media/logos/ims-logo.png" alt="IMS Malawi Logo" style="max-width: 100px; height: auto; margin-bottom: 10px;">
    <h3 style="margin: 0; color: #2F5D50; font-size: 1.2rem;">IMS Malawi Union</h3>
    
</div>
{{ block.super }}
{% endblock %}
