# Docker Compose version
version: '3.8'

# Define all services (containers)
services:
  # ============================================
  # DATABASE SERVICE (PostgreSQL)
  # ============================================
  db:
    image: postgres:15           # Use PostgreSQL version 15
    container_name: ims_db       # Name of the container
    volumes:
      - postgres_data:/var/lib/postgresql/data/  # Persist data
    environment:
      - POSTGRES_DB=ims_malawi_db
      - POSTGRES_USER=ims_admin
      - POSTGRES_PASSWORD=SecurePassword123!
    ports:
      - "5432:5432"              # Map port 5432 on your computer to container
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ims_admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # REDIS SERVICE (For caching and background tasks)
  # ============================================
  redis:
    image: redis:7-alpine         # Use Redis version 7
    container_name: ims_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ============================================
  # BACKEND SERVICE (Django)
  # ============================================
  backend:
    build: ./backend              # Build from the backend/Dockerfile
    container_name: ims_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app            # Mount your code (auto-reload on changes)
      - media_volume:/app/media   # Persist uploaded files
      - static_volume:/app/static # Persist static files
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - DATABASE_URL=postgresql://ims_admin:SecurePassword123!@db:5432/ims_malawi_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env

  # ============================================
  # FRONTEND SERVICE (React)
  # ============================================
  frontend:
    build: ./frontend
    container_name: ims_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  # ============================================
  # NGINX SERVICE (Reverse Proxy - routes requests)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: ims_nginx
    ports:
      - "80:80"                   # Main web port
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - media_volume:/var/www/media
      - static_volume:/var/www/static
    depends_on:
      - backend
      - frontend

# ============================================
# VOLUMES (Persistent storage)
# ============================================
volumes:
  postgres_data:    # Database data persists between container restarts
  redis_data:       # Redis data persists
  media_volume:     # User uploaded files persist
  static_volume:    # Static files persist